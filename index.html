<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">
  <div class="container py-5">

    <h1 class="text-center text-lavender mb-4">
      💰 My Expense Tracker
    </h1>
    <div class="card shadow">
      <div class="card-body">
        <form id="expense-form" class="row g-3">
          <div class="col-md-3">
            <input type="text" id="description" class="form-control" placeholder="Description" required>
          </div>
          <div class="col-md-2">
            <input type="number" id="amount" class="form-control" placeholder="Amount" required>
          </div>
          <div class="col-md-2">
            <input type="date" id="date" class="form-control">
          </div>
          <div class="col-md-2">
            <select id="category" class="form-select">
              <option>Food</option>
              <option>Travel</option>
              <option>Shopping</option>
              <option>Bills</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col-md-3">
            <button class="btn btn-lavender w-100" type="submit">
              Add Expense
            </button>
          </div>
        </form>
      </div>
    </div>
    <div class="row mt-4 g-2">
      <div class="col-md-4">
        <input id="search" class="form-control" placeholder="Search expenses">
      </div>
      <div class="col-md-4">
        <select id="filter" class="form-select">
          <option value="all">
            All Categories
          </option>
          <option>Food</option>
          <option>Travel</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Other</option>
        </select>
      </div>
      <div class="col-md-4">
        <select id="sort" class="form-select">
          <option value="newest">
            Newest
          </option>
          <option value="oldest">
            Oldest
          </option>
          <option value="high">
            Amount High-Low
          </option>
          <option value="low">
            Amount Low-High
          </option>
        </select>
      </div>
    </div>
    <div class="row text-center mt-4">
      <div class="col-md-3">
        <div class="card shadow">
          <div class="card-body">
            <h6>Total</h6>
            <h3 id="totalExpense">
              ₹0
            </h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow">
          <div class="card-body">
            <h6>Highest</h6>
            <h3 id="highestExpense">
              ₹0
            </h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow">
          <div class="card-body">
            <h6>Transactions</h6>
            <h3 id="transactionCount">
              0
            </h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <button id="themeBtn" type="button" class="btn btn-outline-dark w-100 h-100">
          🌙 Dark Mode
        </button>
      </div>
    </div>
    <div class="mt-4">
      <input type="number" id="budget" placeholder="Monthly Budget" class="form-control">
    </div>
    <div class="mt-2">
      Remaining:
      ₹<span id="remaining">0</span>
    </div>
    <div id="progressContainer" class="mt-4"></div>
    <div class="card shadow mt-3">
      <div class="card-body">
        <h5>Category Summary</h5>
        <div id="categoryTotals"></div>
      </div>
    </div>
    <ul class="list-group mt-4" id="expense-list">
    </ul>
    <div class="card shadow mt-5">
      <div class="card-body">
        <h5>Expense Analytics</h5>
        <canvas id="pieChart"></canvas>
      </div>
    </div>
    <div class="card shadow mt-5">
      <div class="card-body">
        <h5>Monthly Analysis</h5>
        <canvas id="barChart"></canvas>
      </div>
    </div>
    <div class="card shadow mt-5">
      <div class="card-body">
        <h5>Expense Trend</h5>
        <canvas id="trendChart"></canvas>
      </div>
    </div>
    <div class="mt-4">
      <button id="csvBtn" type="button" class="btn btn-success">
        Export CSV
      </button>
      <button id="pdfBtn" type="button" class="btn btn-danger">
        Export PDF
      </button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
